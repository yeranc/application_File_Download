# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: zal11.down.zfiledownload
type: application
builder:
  resources:
    excludes:
      - /test/**
      - /localService/**
  customTasks:
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          destination: T30onPrem
          url: http://mgss81a.aws.msg.de:44300
          client: '800'
        app:
          name: ZTMNFDOWNLOAD
          description: Application File Downloader
          package: ZTMC
          transport: T30K902478
        exclude:
          - /test/
